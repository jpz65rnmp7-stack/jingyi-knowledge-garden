# 景一的寓言城堡 · Jekyll 配置
# 使用 just-the-docs 主题 — 专为知识库设计

title: "景一的寓言城堡"
description: "72知识支柱 · 600+篇原创冶炼 · 国学×心理学×隐学×商业实战→人性底层代码 · 全开源可验证"
tagline: "见过底层规则的人 · 帮你觉醒+搞钱+升级认知"
baseurl: "/fable-castle"
url: "https://fable-cc.github.io"

# SEO 优化
lang: zh-CN
locale: zh_CN
timezone: Asia/Shanghai

# 插件
plugins:
  - jekyll-sitemap

# 远程主题
remote_theme: just-the-docs/just-the-docs

# 颜色方案
color_scheme: dark

# 导航设置
search_enabled: true
search:
  heading_level: 2
  previews: 3

# 辅助功能
aux_links:
  "GitHub 仓库":
    - "https://github.com/fable-cc/fable-castle"
aux_links_new_tab: true

# 页脚
footer_content: "Made with 🔥 by 景一 · 从人性出发，自然穿透所有领域 · <a href=\"https://github.com/fable-cc/fable-castle\">GitHub</a> · <a href=\"https://github.com/fable-cc/fable-castle/discussions\">讨论区</a>"

# 返回顶部
back_to_top: true
back_to_top_text: "返回顶部"

# 导航：默认隐藏，只有7个主导航页显示
nav_sort: case_sensitive

defaults:
  - scope:
      path: ""
    values:
      nav_exclude: true
  - scope:
      path: "index.md"
    values:
      nav_exclude: false
  - scope:
      path: "01-方法论/"
    values:
      nav_exclude: false
  - scope:
      path: "02-知识图谱/"
    values:
      nav_exclude: false
  - scope:
      path: "03-内容样本/"
    values:
      nav_exclude: false
  - scope:
      path: "04-关于/"
    values:
      nav_exclude: false
  - scope:
      path: "知识库/"
    values:
      nav_exclude: false
  - scope:
      path: "services/"
    values:
      nav_exclude: false

# 排除不需要的文件
exclude:
  - LICENSE
  - README.md
  - .github/
  - assets/

# Just the Docs 特定配置
heading_anchors: true
gh_edit_link: false

# 性能优化
compress_html:
  clippings: all
  comments: all
  endings: all
  startings: []
  blanklines: false
  profile: false
