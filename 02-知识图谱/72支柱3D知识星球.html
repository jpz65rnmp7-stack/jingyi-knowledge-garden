<div id="info">🏰 景一·知识星球<small>72支柱 · 拖拽旋转 · 滚轮缩放 · 点击探索</small></div>
<div id="popup"><h3 id="pt"></h3><p id="pd"></p><a href="/fable-castle/02-知识图谱/">→ 探索文章</a></div>
<div class="hint">拖拽旋转 · 滚轮缩放 · 点击节点</div>

<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 12;
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

// Starfield
const stars = new THREE.BufferGeometry();
const starPos = new Float32Array(2000*3);
for(let i=0;i<2000*3;i+=3){ starPos[i]=(Math.random()-0.5)*80; starPos[i+1]=(Math.random()-0.5)*80; starPos[i+2]=(Math.random()-0.5)*80; }
stars.setAttribute('position',new THREE.BufferAttribute(starPos,3));
scene.add(new THREE.Points(stars,new THREE.PointsMaterial({color:0x333355,size:0.03})));

// Central sphere
const coreGeo = new THREE.SphereGeometry(1.5, 32, 32);
const coreMat = new THREE.MeshBasicMaterial({ color: 0xC9A96E, wireframe: true, transparent: true, opacity: 0.15 });
scene.add(new THREE.Mesh(coreGeo, coreMat));

// Pillar nodes
const pillars = [
  "钱途心法","暗流规则","意识觉醒","财富商业","模式设计","认知重构",
  "人性说服","权力策略","深度心理学","隐学意识","东学西渐","文明规则",
  "能量管理","经典注疏","百科词条","原始档案","美学修辞","数理思维",
  "全球大V","兵法谋略","中医哲学","科学哲学","政治哲学","博弈实战",
  "组织控制","亲密关系","社会本能","心流研究","情绪工程","神经科学",
  "语言哲学","比较神话","跨文化出海","经济学思维","历史数据库",
  "批判性思维","创造力训练","元认知","师徒传承","教育觉醒",
  "战略思维","风险管理","资源分配","长期规划","危机应对","不确定性决策",
  "存在主义","生命意义","死亡哲学","幸福研究","自由意志","价值论",
  "Agent工程","GEO优化","知识管道","AI素养","提示词工程","AI伦理",
  "内容冶炼","美学修辞","全平台分发","视觉叙事","声音表达","互动设计",
  "品牌叙事","商业伦理","销售转化","视觉叙事","声音表达","互动设计"
];

const nodes = [];
const colors = [0xC9A96E, 0xE8D5B7, 0xA68A4A, 0x8B7355, 0xD4A76A];
pillars.forEach((name, i) => {
  const phi = Math.acos(-1 + (2*i)/pillars.length);
  const theta = Math.sqrt(pillars.length*Math.PI)*phi;
  const r = 5 + Math.random()*1.5;
  const geo = new THREE.SphereGeometry(0.12, 16, 16);
  const mat = new THREE.MeshBasicMaterial({ color: colors[i%5] });
  const node = new THREE.Mesh(geo, mat);
  node.position.set(r*Math.cos(theta)*Math.sin(phi), r*Math.sin(theta)*Math.sin(phi), r*Math.cos(phi));
  node.userData = { name };
  node.userData.orbit = { r, theta, phi, speed: 0.0003+Math.random()*0.0005 };
  scene.add(node);
  nodes.push(node);

  // Orbiting ring
  const ringGeo = new THREE.TorusGeometry(r, 0.01, 8, 64);
  const ring = new THREE.Mesh(ringGeo, new THREE.MeshBasicMaterial({ color: 0xC9A96E, transparent: true, opacity: 0.06 }));
  scene.add(ring);
});

// Glow rings
for(let i=0;i<3;i++){
  const ringGeo = new THREE.TorusGeometry(4+i*1.5, 0.015, 8, 128);
  const ring = new THREE.Mesh(ringGeo, new THREE.MeshBasicMaterial({ color: 0xC9A96E, transparent: true, opacity: 0.08 }));
  ring.rotation.x = Math.PI/2 + i*0.5;
  ring.rotation.y = i*0.7;
  scene.add(ring);
}

// Raycaster for click
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const popup = document.getElementById('popup');

window.addEventListener('click', (e) => {
  mouse.x = (e.clientX/window.innerWidth)*2-1;
  mouse.y = -(e.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(nodes);
  if(hits.length){
    const n = hits[0].object.userData.name;
    document.getElementById('pt').textContent = n;
    document.getElementById('pd').textContent = '72支柱之一 · 点击探索';
    popup.style.display = 'block';
    setTimeout(()=>popup.style.display='none', 3000);
  }
});

let isDragging = false, prevX, prevY, rotX=0, rotY=0;
renderer.domElement.addEventListener('mousedown', e => { isDragging=true; prevX=e.clientX; prevY=e.clientY; });
renderer.domElement.addEventListener('mouseup', () => isDragging=false);
renderer.domElement.addEventListener('mousemove', e => {
  if(!isDragging) return;
  rotY += (e.clientX-prevX)*0.005;
  rotX += (e.clientY-prevY)*0.005;
  prevX=e.clientX; prevY=e.clientY;
});
renderer.domElement.addEventListener('wheel', e => { camera.position.z += e.deltaY*0.01; camera.position.z = Math.max(5, Math.min(20, camera.position.z)); });

function animate(){
  requestAnimationFrame(animate);
  nodes.forEach(n => {
    const o = n.userData.orbit;
    o.theta += o.speed;
    o.phi += o.speed*0.7;
    n.position.x = o.r*Math.cos(o.theta)*Math.sin(o.phi);
    n.position.y = o.r*Math.sin(o.theta)*Math.sin(o.phi);
    n.position.z = o.r*Math.cos(o.phi);
  });
  scene.rotation.y += rotY*0.05; rotY*=0.95;
  scene.rotation.x += rotX*0.05; rotX*=0.95;
  renderer.render(scene, camera);
}
animate();
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
