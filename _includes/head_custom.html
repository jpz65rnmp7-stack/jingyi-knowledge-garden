.services {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 1.5rem; margin: 1.5rem 0;
}
.service-card {
  background: rgba(201,169,110,0.05); border: 1px solid rgba(201,169,110,0.12);
  border-radius: 12px; padding: 1.5rem;
  transition: border-color 0.2s;
}
.service-card:hover { border-color: rgba(201,169,110,0.35); }
.service-card strong { font-size: 1.15rem; color: #C9A96E; display: block; margin-bottom: 0.5rem; }
.service-card p { font-size: 0.9rem; color: #8b949e; margin-bottom: 0.8rem; }
.service-card a { color: #C9A96E; font-weight: 600; font-size: 0.9rem; }

/* giscus */
.giscus-wrapper {
