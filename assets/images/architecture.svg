  <!-- Core Node -->
  <circle cx="600" cy="160" r="50" fill="none" stroke="url(#core)" stroke-width="2" opacity="0.3"/>
  <circle cx="600" cy="160" r="42" fill="#1a1a2e" stroke="url(#core)" stroke-width="2"/>
  <text x="600" y="155" text-anchor="middle" font-size="16" font-weight="bold" fill="url(#core)">从人性出发</text>
  <text x="600" y="175" text-anchor="middle" font-size="11" fill="#8b949e">自然穿透所有领域</text>

