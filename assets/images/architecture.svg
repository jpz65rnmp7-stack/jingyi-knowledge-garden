  <text x="990" y="440" text-anchor="middle" font-size="18" font-weight="bold" fill="#F43F5E">🔮 隐学意识</text>
  <text x="990" y="465" text-anchor="middle" font-size="12" fill="#8b949e">黄帝内经 · 道教内丹 · 杨朱哲学 · 心身医学</text>
  <text x="990" y="488" text-anchor="middle" font-size="11" fill="#484f58">风水×环境心理 → 内经×心身医学 → 杨朱×个人主义</text>

  <rect x="820" y="530" width="340" height="100" rx="10" fill="#1a1a2e" stroke="#FB923C" stroke-width="1.5" opacity="0.9"/>
  <text x="990" y="560" text-anchor="middle" font-size="18" font-weight="bold" fill="#FB923C">🌐 全球大V</text>
  <text x="990" y="585" text-anchor="middle" font-size="12" fill="#8b949e">当代思想框架 · 认知模型 · 实操系统</text>
  <text x="990" y="608" text-anchor="middle" font-size="11" fill="#484f58">纳瓦尔 · 芒格 · 彼得森 · 达利欧 · 塔勒布</text>

  <!-- Connection Lines from Center -->
  <line x1="600" y1="210" x2="210" y2="290" stroke="#30363d" stroke-width="0.5"/>
  <line x1="600" y1="210" x2="210" y2="410" stroke="#30363d" stroke-width="0.5"/>
  <line x1="600" y1="210" x2="210" y2="530" stroke="#30363d" stroke-width="0.5"/>
  <line x1="600" y1="210" x2="600" y2="290" stroke="#30363d" stroke-width="0.5"/>
  <line x1="600" y1="210" x2="600" y2="410" stroke="#30363d" stroke-width="0.5"/>
  <line x1="600" y1="210" x2="600" y2="530" stroke="#30363d" stroke-width="0.5"/>
  <line x1="600" y1="210" x2="990" y2="290" stroke="#30363d" stroke-width="0.5"/>
  <line x1="600" y1="210" x2="990" y2="410" stroke="#30363d" stroke-width="0.5"/>
  <line x1="600" y1="210" x2="990" y2="530" stroke="#30363d" stroke-width="0.5"/>

  <!-- Bottom: Pipeline -->
  <rect x="200" y="670" width="800" height="55" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="600" y="692" text-anchor="middle" font-size="13" fill="#8b949e">📥 多平台抓取 → 🏷️ AI分类 → 🔄 去重 → ⭐ 质量过滤 → ✍️ 景一改写 → 📝 Obsidian输出</text>
