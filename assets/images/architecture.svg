  <text x="600" y="560" text-anchor="middle" font-size="18" font-weight="bold" fill="#A855F7">🧠 深度心理学</text>
  <text x="600" y="585" text-anchor="middle" font-size="12" fill="#8b949e">人格结构 · 行为动机 · 潜意识 · 习惯形成</text>
