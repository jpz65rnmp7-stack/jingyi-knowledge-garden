  <text x="210" y="368" text-anchor="middle" font-size="11" fill="#484f58">富兰克林搞钱法 → 希尔心智财富 → 范蠡商道</text>

  <rect x="40" y="410" width="340" height="100" rx="10" fill="#1a1a2e" stroke="#10B981" stroke-width="1.5" opacity="0.9"/>
