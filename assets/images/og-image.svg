<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C9A96E"/>
      <stop offset="100%" style="stop-color:#E8D5B7"/>
    </linearGradient>
    <linearGradient id="gold-vertical" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8D5B7"/>
      <stop offset="100%" style="stop-color:#C9A96E"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#C9A96E" stroke-width="0.5">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="473" x2="1200" y2="473"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <!-- Decorative elements -->
  <circle cx="1100" cy="80" r="180" fill="#C9A96E" opacity="0.02"/>
  <circle cx="100" cy="550" r="220" fill="#E8D5B7" opacity="0.02"/>

  <!-- Title -->
  <text x="600" y="165" text-anchor="middle" font-family="serif" font-size="72" font-weight="bold" fill="url(#gold)" filter="url(#glow)">景一 · 寓言城堡</text>

  <!-- Subtitle -->
  <text x="600" y="235" text-anchor="middle" font-family="sans-serif" font-size="30" fill="#E8D5B7" opacity="0.9">不是搬运工，是冶炼者</text>

  <!-- Gold divider -->
  <line x1="350" y1="275" x2="850" y2="275" stroke="url(#gold)" stroke-width="1" opacity="0.5"/>

  <!-- 9 Dimensions represented as characters -->
  <g font-family="sans-serif" text-anchor="middle">
    <text x="133" y="350" font-size="36" fill="#C9A96E" opacity="0.9">🪙</text>
    <text x="133" y="385" font-size="14" fill="#8b949e">商业引擎</text>

    <text x="266" y="350" font-size="36" fill="#C9A96E" opacity="0.9">🏰</text>
    <text x="266" y="385" font-size="14" fill="#8b949e">权力博弈</text>

    <text x="400" y="350" font-size="36" fill="#C9A96E" opacity="0.9">🔬</text>
    <text x="400" y="385" font-size="14" fill="#8b949e">认知科学</text>

    <text x="533" y="350" font-size="36" fill="#C9A96E" opacity="0.9">📜</text>
    <text x="533" y="385" font-size="14" fill="#8b949e">国学体系</text>

    <text x="666" y="350" font-size="36" fill="#C9A96E" opacity="0.9">🏛️</text>
    <text x="666" y="385" font-size="14" fill="#8b949e">东西融合</text>

    <text x="800" y="350" font-size="36" fill="#C9A96E" opacity="0.9">🦅</text>
    <text x="800" y="385" font-size="14" fill="#8b949e">人性洞察</text>

    <text x="933" y="350" font-size="36" fill="#C9A96E" opacity="0.9">🤖</text>
    <text x="933" y="385" font-size="14" fill="#8b949e">AI工程</text>

    <text x="1066" y="350" font-size="36" fill="#C9A96E" opacity="0.9">✍️</text>
    <text x="1066" y="385" font-size="14" fill="#8b949e">创作系统</text>
  </g>

  <!-- Second row dimension -->
  <text x="600" y="430" text-anchor="middle" font-family="sans-serif" font-size="36" fill="#C9A96E" opacity="0.9">🌍</text>
  <text x="600" y="465" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#8b949e">全球智库</text>

  <!-- Stats row -->
  <g font-family="sans-serif" text-anchor="middle">
    <text x="250" y="520" font-size="36" font-weight="bold" fill="#C9A96E">36</text>
    <text x="250" y="545" font-size="15" fill="#8b949e">知识支柱</text>

    <text x="500" y="520" font-size="36" font-weight="bold" fill="#C9A96E">77⁺</text>
    <text x="500" y="545" font-size="15" fill="#8b949e">原创冶炼</text>

    <text x="750" y="520" font-size="36" font-weight="bold" fill="#C9A96E">9</text>
    <text x="750" y="545" font-size="15" fill="#8b949e">维度</text>

    <text x="950" y="520" font-size="36" font-weight="bold" fill="#C9A96E">开源</text>
    <text x="950" y="545" font-size="15" fill="#8b949e">可验证</text>
  </g>

  <!-- Bottom -->
  <text x="600" y="600" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#555">fable-cc.github.io/fable-castle · GitHub 第一开源知识库</text>
</svg>
