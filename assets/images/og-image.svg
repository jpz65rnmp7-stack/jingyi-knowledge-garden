<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C9A96E"/>
      <stop offset="100%" style="stop-color:#E8D5B7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1000" cy="100" r="200" fill="#C9A96E" opacity="0.03"/>
  <circle cx="200" cy="550" r="250" fill="#E8D5B7" opacity="0.03"/>
  <circle cx="1100" cy="500" r="150" fill="#C9A96E" opacity="0.04"/>

  <!-- Main text -->
  <text x="600" y="200" text-anchor="middle" font-family="'Noto Serif SC', 'Songti SC', serif" font-size="64" font-weight="bold" fill="url(#gold)" filter="url(#glow)">景一 · 寓言城堡</text>

  <text x="600" y="280" text-anchor="middle" font-family="'Noto Sans SC', 'PingFang SC', sans-serif" font-size="28" fill="#E8D5B7" opacity="0.85">不是搬运工，是冶炼者</text>

  <!-- Divider -->
  <line x1="400" y1="330" x2="800" y2="330" stroke="#C9A96E" stroke-width="1" opacity="0.5"/>

  <!-- Three pillars -->
  <text x="300" y="410" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="22" fill="#E8D5B7" opacity="0.8">🪙 钱途心法</text>
  <text x="300" y="445" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="16" fill="#888">外层实操 · 搞钱心法</text>

  <text x="600" y="410" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="22" fill="#E8D5B7" opacity="0.8">🏰 暗流规则</text>
  <text x="600" y="445" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="16" fill="#888">中层认知 · 权力结构</text>

  <text x="900" y="410" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="22" fill="#E8D5B7" opacity="0.8">🧬 意识觉醒</text>
  <text x="900" y="445" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="16" fill="#888">内层意识 · NPC觉醒</text>

  <!-- Bottom text -->
  <text x="600" y="540" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="18" fill="#666">国学 × 心理学 × 隐学 × 商业实战 → 人性底层代码</text>

  <text x="600" y="580" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="14" fill="#555">fable-cc.github.io/fable-castle</text>
</svg>
